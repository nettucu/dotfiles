antidote:
  repo: https://github.com/mattmc3/antidote.git
  target_dir: .local/share/antidote

npm:
  global_packages:
    - "@anthropic-ai/claude-code"
    - "@openai/codex"
    - "@google/gemini-cli"

linux:
  pacman:
    packages:
      - age
      - parallel
      - ripgrep
      - sd
      - jq
      - fd
  aur:
    packages:
      - antigravity
      - brave-bin
  server:
    apt:
      packages:
        - git
        - curl
        - neovim
        - ripgrep
        - fd-find
        - bat
    dnf:
      packages:
        - git
        - curl
        - neovim
        - ripgrep
        - fd-find
        - bat

macos:
  brew:
    casks:
      - antigravity
      - brave-browser
      - claude-code
      - codex
      - gcloud-cli
      - google-chrome
      - insync
      - keepassxc
      - kitty
      - nimble-commander
      - visual-studio-code
    packages:
      - age
      - fnm
      - git
      - gh
      - neovim
      - starship
      - bat
      - fd
      - lsd
      - ripgrep
      - fzf
      - uv
      - zsh
      - awk
      - btop
      - gemini-cli
      - htop
      - iproute2mac
      - yubikey-agent
      - coreutils
      - findutils
      - gnu-sed
      - gnu-tar
      - grep
      - sd
      - jq
      - oven-sh/bun/bun
      - parallel

skills:
  wshobson/agents:
    - code-review-excellence
    - python-anti-patterns
    - async-python-patterns
    - python-configuration
    - python-error-handling
    - python-project-structure
    - python-resilience
    - python-resource-management
    - python-testing-patterns
    - python-type-safety
    - python-design-patterns
  vercel-labs/skills:
    - find-skills
  obra/superpowers:
    - brainstorming
    - dispatching-parallel-agents
    - executing-plans
    - finishing-a-development-branch
    - receiving-code-review
    - requesting-code-review
    - subagent-driven-development
    - systematic-debugging
    - test-driven-development
    - using-superpowers
    - writing-plans
    - writing-skills
    - verification-before-completion
    - using-git-worktrees
  forrestchang/andrej-karpathy-skills:
    - karpathy-guidelines
  anthropics/skills:
    - docx
    - pdf
    - pptx
    - xlsx
    - frontend-design
  mattnowdev/thinking-partner:
    - thinking-partner

windows:
  package_manager: winget
  packages:
    - Git.Git
    - Microsoft.PowerShell
    - Microsoft.WindowsTerminal
    - Neovim.Neovim
    - BurntSushi.ripgrep.MSVC
    - sharkdp.fd
    - Starship.Starship
    - GitHub.cli
    - Schniz.fnm
    - Oven-sh.Bun
    - jqlang.jq
  safe_defaults:
    show_file_extensions: true
    show_hidden_files: true
    show_protected_os_files: false
